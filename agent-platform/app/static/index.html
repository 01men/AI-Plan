<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>榕器 · Agent 人机协作平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: '#1a365d',
        secondary: '#2c5282',
        accent: '#ed8936',
        teal: '#319795',
        danger: '#e53e3e',
        success: '#38a169',
        dark: '#0f172a',
      },
      fontFamily: { sans: ['Noto Sans SC', 'system-ui', 'sans-serif'] }
    }
  }
};
</script>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body class="text-gray-800">

<!-- ================= 登录页 ================= -->
<div id="login-view" class="min-h-screen gradient-primary relative overflow-hidden">
  <div class="absolute inset-0 bg-gradient-to-br from-primary/90 via-secondary/80 to-teal/60"></div>
  <div class="relative max-w-6xl mx-auto px-8 py-12">
    <div class="flex items-center space-x-4 mb-3">
      <div class="w-12 h-12 gradient-accent rounded-xl flex items-center justify-center shadow-lg">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      </div>
      <div>
        <h1 class="text-3xl font-black text-white tracking-wide">榕器 · Agent 人机协作平台</h1>
        <p class="text-gray-300 text-sm mt-1">金华聚杰电器 · AI数智化行动方案支撑底座</p>
      </div>
    </div>
    <div class="section-divider w-40 my-6"></div>
    <p class="text-gray-200 mb-6">请选择你的身份进入平台（演示环境免密登录）：</p>
    <div id="login-people">
      <div class="text-gray-300 flex items-center space-x-2">
        <span class="spinner"></span><span>正在加载组织人员…</span>
      </div>
    </div>
  </div>
</div>

<!-- ================= 主界面 ================= -->
<div id="app-view" class="hidden">
  <!-- 左侧深色固定导航 -->
  <aside class="fixed inset-y-0 left-0 w-60 gradient-dark flex flex-col z-40 shadow-xl">
    <div class="h-16 flex items-center px-5 border-b border-white/10 shrink-0">
      <div class="w-9 h-9 gradient-accent rounded-lg flex items-center justify-center mr-3 shrink-0">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      </div>
      <div>
        <div class="text-white font-bold leading-tight">榕器 · Agent</div>
        <div class="text-gray-400 text-xs">人机协作平台</div>
      </div>
    </div>
    <nav id="side-nav" class="flex-1 overflow-y-auto py-4 px-3 space-y-1"></nav>
    <div id="side-user" class="p-4 border-t border-white/10 shrink-0"></div>
  </aside>

  <!-- 右侧主区 -->
  <div class="ml-60 min-h-screen flex flex-col">
    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 sticky top-0 z-30 shrink-0">
      <h1 id="topbar-title" class="text-lg font-bold text-primary"></h1>
      <div class="flex items-center space-x-4">
        <button id="btn-heartbeat" class="btn-heartbeat" title="项目管理智能体立即巡检：发布日报并催办临期任务">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
          <span>手动触发心跳</span>
        </button>
        <div id="topbar-user" class="flex items-center space-x-2"></div>
      </div>
    </header>
    <main id="view-container" class="flex-1 p-6"></main>
  </div>
</div>

<div id="toast-root" class="fixed top-5 right-5 z-[100] space-y-2 w-80"></div>
<div id="modal-root"></div>
<div id="drawer-root"></div>

<script src="/static/app.js"></script>
</body>
</html>
